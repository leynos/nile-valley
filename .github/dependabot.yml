version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:00"
      timezone: "Etc/UTC"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for the Bun-managed package.json at the
  # repository root (bun.lock is the lockfile)
  - package-ecosystem: "bun"
    directory: "/"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "bun"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:10"
      timezone: "Etc/UTC"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for Helm charts
  - package-ecosystem: "helm"
    directory: "/deploy/charts/example-app"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "helm"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
      timezone: "Etc/UTC"
    cooldown:
      default-days: 7
      semver-major-days: 14

  # Enable version updates for Go modules under infra
  - package-ecosystem: "gomod"
    directories:
      - "/infra/testutil"
      - "/infra/clusters/nile-valley-infra-k8s/tests"
      - "/infra/clusters/dev/tests"
      - "/infra/modules/cert_manager/tests"
      - "/infra/modules/cnpg/tests"
      - "/infra/modules/doks/tests"
      - "/infra/modules/external_dns/tests"
      - "/infra/modules/fluxcd/tests"
      - "/infra/modules/platform_render/tests"
      - "/infra/modules/traefik/tests"
      - "/infra/modules/valkey/tests"
      - "/infra/modules/vault_appliance/tests"
      - "/infra/modules/vault_eso/tests"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
      semver-major-days: 14
