name: ci
"on":
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubicloud-standard-8
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v4

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2
        with:
          bun-version: '1.3.5'

      - name: Install uv
        id: setup-uv
        # v6.4.3
        uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6
        with:
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install Nixie
        run: uv tool install --from git+https://github.com/leynos/nixie nixie

      - name: Setup Helm
        # v4.3.1
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4
        with:
          version: v3.15.0

      - name: Install yamllint
        run: uv tool install yamllint==1.35.1

      - name: Install action-validator
        run: bun install -g action-validator

      - name: Install actionlint
        shell: bash
        run: |
          set -euxo pipefail

          version="1.7.7"
          arch_raw="$(uname -m)"
          case "$arch_raw" in
            x86_64)
              arch="x86_64"
              ;;
            aarch64|arm64)
              arch="arm64"
              ;;
            *)
              echo "Unsupported architecture for actionlint: ${arch_raw}" >&2
              exit 1
              ;;
          esac

          url="https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_${arch}.tar.gz"
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT

          curl -fsSL "$url" -o "$tmpdir/actionlint.tar.gz"
          tar -xzf "$tmpdir/actionlint.tar.gz" -C "$tmpdir"
          install -m 0755 "$tmpdir/actionlint" /usr/local/bin/actionlint
          actionlint --version

      - name: Install TFLint
        # v6.2.1
        uses: terraform-linters/setup-tflint@4cb9feea73331a35b422df102992a03a44a3bb33
        with:
          tflint_version: v0.55.1

      - name: Install dependencies
        run: make deps

      - name: Markdown lint
        run: make markdownlint

      - name: Nixie
        run: make nixie

      - name: YAML lint
        run: make yamllint

      - name: Lint
        run: make lint

      - name: Format check
        run: make check-fmt

      - name: Tests
        run: make test
