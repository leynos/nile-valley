name: ci
"on":
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubicloud-standard-8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v4

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76  # v2
        with:
          bun-version: '1.3.5'

      - name: Install uv
        id: setup-uv
        # v6.4.3
        uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6
        with:
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Install Nixie
        run: uv tool install nixie-cli==1.1.0

      - name: Setup Rust for Merman
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # master
        with:
          toolchain: '1.95.0'

      - name: Install Merman CLI
        run: cargo install merman-cli --version '=0.7.0' --locked

      - name: Setup Helm
        # v4.3.1
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4
        with:
          version: v3.15.0

      - name: Install yamllint
        run: uv tool install yamllint==1.35.1

      - name: Install action-validator
        shell: bash
        run: |
          set -euxo pipefail
          url="https://github.com/mpalmer/action-validator/releases/download/v0.8.0/action-validator_linux_amd64"
          checksum_url="https://api.github.com/repos/mpalmer/action-validator/releases/tags/v0.8.0"
          local_bin="$HOME/.local/bin"
          binary_name="action-validator_linux_amd64"
          uv run scripts/install_action_validator.py \
            --url "$url" \
            --checksum-url "$checksum_url" \
            --local-bin "$local_bin" \
            --binary-name "$binary_name"
          echo "$local_bin" >> "$GITHUB_PATH"

      - name: Install mbake
        run: uv tool install mbake==1.4.4

      - name: Setup Go
        # v5.0.2
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: '1.22.x'

      - name: Install actionlint
        shell: bash
        run: |
          set -euxo pipefail
          version="1.7.10"
          go install "github.com/rhysd/actionlint/cmd/actionlint@v${version}"
          gobin="$(go env GOPATH)/bin"
          echo "$gobin" >> "$GITHUB_PATH"
          "$gobin/actionlint" -version

      - name: Install checkmake
        shell: bash
        run: |
          set -euxo pipefail
          version="0.3.2"
          go install "github.com/checkmake/checkmake/cmd/checkmake@v${version}"
          gobin="$(go env GOPATH)/bin"
          "$gobin/checkmake" --version

      - name: Install TFLint
        # v6.2.1
        uses: terraform-linters/setup-tflint@4cb9feea73331a35b422df102992a03a44a3bb33
        with:
          tflint_version: v0.55.1

      - name: Install dependencies
        run: make deps

      - name: Add node_modules/.bin to PATH
        run: echo "${{ github.workspace }}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Spelling
        run: make spelling

      - name: Markdown lint
        run: make markdownlint

      - name: Nixie
        run: make nixie

      - name: YAML lint
        run: make yamllint

      - name: Lint
        run: make lint

      - name: Format check
        run: make check-fmt

      - name: Tests
        run: make test
